# LPA Review App — Production deployment (local build)
#
# All services built locally on the server.
# Qdrant and Redis are internal-only (no host port binding).
#
# Required files on server:
#   docker-compose.yml  (this file)
#   nginx.conf
#   backend/.env        (with real secrets — NEVER committed to git)
#   prompts/            (Dockerfile COPY needs this)

services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: lpa-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Hugging Face 国内镜像，阿里云服务器建议开启
      - HF_ENDPOINT=https://hf-mirror.com
      # Container-internal URLs (override .env localhost defaults)
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    networks:
      - lpa-network
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: lpa-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_URL=http://backend:8000
    networks:
      - lpa-network
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: lpa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lpa-network
    depends_on:
      - backend
      - frontend

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lpa-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - lpa-network

  redis:
    image: redis:7-alpine
    container_name: lpa-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - lpa-network

networks:
  lpa-network:
    driver: bridge

volumes:
  backend_data:
  backend_media:
  qdrant_data:
  redis_data:
