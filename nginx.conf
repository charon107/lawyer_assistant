# LPA Review App — Nginx reverse proxy (Cloudflare-compatible)
#
# Cloudflare handles SSL termination. Origin serves HTTP only.
# Frontend on :3000, Backend on :8000
#
# IMPORTANT: resolver + $upstream variables prevent stale DNS caching.
# Without this, nginx caches backend/frontend IPs at startup and returns
# 502 Bad Gateway when containers are recreated with new IPs.

resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name lawyer-olivia.com www.lawyer-olivia.com;

    client_max_body_size 50M;

    # API v1 → FastAPI backend
    location /api/v1/ {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else → Next.js frontend
    location / {
        set $upstream_frontend http://frontend:3000;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
