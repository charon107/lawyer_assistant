name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            cd /opt/lpa_review_app

            # Pull latest code
            echo "=== Pulling latest code ==="
            git pull origin main || { echo "ERROR: git pull failed"; exit 1; }

            # Login to ACR
            echo "=== Logging into ACR ==="
            echo "${{ secrets.ACR_PASSWORD }}" | docker login \
              --username="${{ secrets.ACR_USERNAME }}" \
              --password-stdin ${{ env.ACR_REGISTRY }}

            # Pull pre-built images
            echo "=== Pulling images ==="
            docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend:latest
            docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest

            # Tag for docker-compose
            docker tag ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend:latest lpa-backend:latest
            docker tag ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest lpa-frontend:latest

            # Restart services
            echo "=== Starting services ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans || { echo "ERROR: deploy failed"; exit 1; }

            # Wait for health checks
            echo "=== Waiting for services to be healthy ==="
            sleep 15

            # Verify backend
            for i in 1 2 3 4 5; do
              if docker exec lpa-backend curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                echo "Backend: healthy"
                break
              fi
              echo "Backend: waiting... (attempt $i/5)"
              sleep 10
            done

            # Verify frontend
            for i in 1 2 3 4 5; do
              if docker exec lpa-frontend curl -sf http://localhost:3000/ > /dev/null 2>&1; then
                echo "Frontend: healthy"
                break
              fi
              echo "Frontend: waiting... (attempt $i/5)"
              sleep 10
            done

            # Show running containers
            echo "=== Running containers ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'

            # Cleanup old images
            docker image prune -f --filter "until=72h"

            echo "=== Deploy complete ==="
