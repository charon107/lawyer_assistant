name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            # Handle one-time migration from the old deployment path
            if [ ! -d /opt/lexmind ]; then
              if [ -d /opt/lpa_review_app ]; then
                echo "=== Migrating server directory: lpa_review_app → lexmind ==="
                mv /opt/lpa_review_app /opt/lexmind
              else
                echo "ERROR: /opt/lexmind does not exist." >&2
                echo "Run: git clone <repo-url> /opt/lexmind && cp /path/to/backend/.env /opt/lexmind/backend/.env" >&2
                exit 1
              fi
            fi

            cd /opt/lexmind

            # Pull latest code
            echo "=== Pulling latest code ==="
            git pull origin main || { echo "ERROR: git pull failed"; exit 1; }

            # Login to ACR
            echo "=== Logging into ACR ==="
            echo "${{ secrets.ACR_PASSWORD }}" | docker login \
              --username="${{ secrets.ACR_USERNAME }}" \
              --password-stdin ${{ env.ACR_REGISTRY }}

            # Pull pre-built images
            echo "=== Pulling images ==="
            docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend:latest
            docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest

            # Tag for docker-compose
            docker tag ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/backend:latest lexmind-backend:latest
            docker tag ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/frontend:latest lexmind-frontend:latest

            # Stop any legacy containers holding ports 80/443 (e.g., from the
            # old lpa_review_app compose project that --remove-orphans cannot
            # see because the project name changed to lexmind).
            echo "=== Releasing ports 80/443 from legacy containers ==="
            for port in 80 443; do
              for cid in $(docker ps --filter "publish=$port" -q); do
                name=$(docker inspect -f '{{.Name}}' "$cid" | sed 's|^/||')
                if [ "$name" != "lexmind-nginx" ]; then
                  echo "Stopping legacy container $name ($cid) holding port $port"
                  docker stop "$cid" || true
                  docker rm "$cid" || true
                fi
              done
            done

            # Remove stale containers to avoid "No such container" race on recreate
            echo "=== Removing stale containers ==="
            docker compose -f docker-compose.prod.yml stop backend frontend 2>/dev/null || true
            docker compose -f docker-compose.prod.yml rm -f backend frontend 2>/dev/null || true

            # Restart services
            echo "=== Starting services ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans || { echo "ERROR: deploy failed"; exit 1; }

            # Wait for backend container to be running before running migrations
            echo "=== Waiting for backend container ==="
            for i in 1 2 3 4 5 6; do
              if docker ps --filter name=lexmind-backend --filter status=running --format '{{.Names}}' | grep -q lexmind-backend; then
                break
              fi
              echo "Waiting for backend container... ($i/6)"
              sleep 5
            done

            # Run database migrations inside the running backend container
            echo "=== Running database migrations ==="
            docker exec lexmind-backend uv run alembic upgrade head \
              || echo "WARNING: Migration step failed — check container logs"

            # Wait for health checks
            echo "=== Waiting for services to be healthy ==="
            sleep 10

            # Verify backend
            for i in 1 2 3 4 5; do
              if docker exec lexmind-backend curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                echo "Backend: healthy"
                break
              fi
              echo "Backend: waiting... (attempt $i/5)"
              sleep 10
            done

            # Verify frontend
            for i in 1 2 3 4 5; do
              if docker exec lexmind-frontend curl -sf http://localhost:3000/ > /dev/null 2>&1; then
                echo "Frontend: healthy"
                break
              fi
              echo "Frontend: waiting... (attempt $i/5)"
              sleep 10
            done

            # Verify host :80 → nginx → backend.
            # Catches the "container Up but PortBindings set, Ports empty" bug
            # where docker silently fails to bind the host port. The in-container
            # checks above pass even in that state, so we must hit :80 from the
            # host to confirm the public path actually works.
            echo "=== Verifying host :80 reachability ==="
            for i in 1 2 3 4 5; do
              if curl -sf http://127.0.0.1/api/v1/health > /dev/null 2>&1; then
                echo "Host :80: healthy"
                break
              fi
              if [ "$i" = "5" ]; then
                echo "ERROR: host :80 unreachable after $i attempts." >&2
                echo "  Diagnose: docker inspect lexmind-nginx --format '{{json .NetworkSettings.Ports}}'" >&2
                echo "  Fix:      docker compose -f docker-compose.prod.yml up -d --force-recreate nginx" >&2
                exit 1
              fi
              echo "Host :80: waiting... (attempt $i/5)"
              sleep 10
            done

            # Show running containers
            echo "=== Running containers ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'

            # Cleanup old images
            docker image prune -f --filter "until=72h"

            echo "=== Deploy complete ==="
