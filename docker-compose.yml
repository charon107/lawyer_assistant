# LPA Review App — Docker Compose (local build)
#
# All three services built locally. CI/CD pushes to GHCR but
# server builds from source until registry auth is configured.

services:
  backend:
    build: ./backend
    container_name: lpa-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    networks:
      - lpa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: lpa-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_URL=http://backend:8000
    networks:
      - lpa-network
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: lpa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lpa-network
    depends_on:
      - backend
      - frontend

networks:
  lpa-network:
    driver: bridge

volumes:
  backend_data:
  backend_media:
